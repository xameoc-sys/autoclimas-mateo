<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="tankgrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4D8"/>
      <stop offset="30%" style="stop-color:#0077B6"/>
      <stop offset="100%" style="stop-color:#005A8D"/>
    </linearGradient>
  </defs>
  <!-- Tank body -->
  <ellipse cx="60" cy="90" rx="25" ry="8" fill="#005A8D"/>
  <rect x="35" y="30" width="50" height="60" rx="8" fill="url(#tankgrad)"/>
  <!-- Tank top -->
  <ellipse cx="60" cy="30" rx="25" ry="8" fill="#00B4D8"/>
  <!-- Valve -->
  <rect x="55" y="18" width="10" height="15" rx="2" fill="#718096"/>
  <rect x="50" y="15" width="20" height="5" rx="1" fill="#4a5568"/>
  <!-- Frost effect -->
  <circle cx="45" cy="50" r="8" fill="white" opacity="0.3"/>
  <circle cx="70" cy="60" r="5" fill="white" opacity="0.25"/>
  <circle cx="55" cy="70" r="6" fill="white" opacity="0.2"/>
  <!-- Pressure gauge on tank -->
  <circle cx="75" cy="50" r="12" fill="#1a202c" stroke="#718096" stroke-width="2"/>
  <circle cx="75" cy="50" r="8" fill="#2d3748"/>
  <line x1="75" y1="50" x2="80" y2="45" stroke="#FC8181" stroke-width="1.5"/>
  <!-- R-134a label -->
  <text x="60" y="70" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">R-134a</text>
</svg>
