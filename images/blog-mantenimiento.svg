<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="wrenchgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48BB78"/>
      <stop offset="100%" style="stop-color:#276749"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="200" fill="#1a202c"/>
  <!-- Tools grid -->
  <!-- Wrench -->
  <g transform="translate(40, 50)">
    <rect x="5" y="20" width="50" height="10" fill="#A0AEC0" transform="rotate(30 30 25)"/>
    <circle cx="55" cy="45" r="12" fill="none" stroke="#A0AEC0" stroke-width="6"/>
  </g>
  <!-- Screwdriver -->
  <g transform="translate(120, 45)">
    <rect x="10" y="0" width="8" height="40" fill="#718096"/>
    <rect x="5" y="35" width="18" height="12" rx="2" fill="#E53E3E"/>
  </g>
  <!-- Oil drop -->
  <g transform="translate(200, 50)">
    <ellipse cx="25" cy="30" rx="20" ry="25" fill="#D69E2E"/>
    <ellipse cx="20" cy="20" rx="8" ry="5" fill="#ECC94B" opacity="0.5"/>
  </g>
  <!-- Checklist -->
  <rect x="80" y="110" width="140" height="70" rx="5" fill="white" opacity="0.9"/>
  <line x1="95" y1="130" x2="120" y2="130" stroke="#48BB78" stroke-width="3"/>
  <line x1="95" y1="150" x2="130" y2="150" stroke="#48BB78" stroke-width="3"/>
  <line x1="95" y1="170" x2="110" y2="170" stroke="#48BB78" stroke-width="3"/>
  <rect x="130" y="125" width="60" height="8" rx="2" fill="#E2E8F0"/>
  <rect x="130" y="145" width="80" height="8" rx="2" fill="#E2E8F0"/>
  <rect x="130" y="165" width="45" height="8" rx="2" fill="#E2E8F0"/>
  <!-- Text -->
  <text x="150" y="195" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">MANTENIMIENTO PREVENTIVO</text>
</svg>
