<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="fuelgrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#805AD5"/>
      <stop offset="100%" style="stop-color:#553C9A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="200" fill="#1a202c"/>
  <!-- Gas pump -->
  <rect x="100" y="30" width="50" height="140" rx="5" fill="#4A5568"/>
  <rect x="110" y="40" width="30" height="40" fill="#2D3748"/>
  <!-- Screen -->
  <rect x="115" y="45" width="20" height="15" fill="#48BB78"/>
  <text x="125" y="56" text-anchor="middle" fill="white" font-family="monospace" font-size="8">$</text>
  <!-- Nozzle -->
  <rect x="155" y="60" width="30" height="8" rx="2" fill="#718096"/>
  <rect x="180" y="58" width="15" height="12" rx="2" fill="#A0AEC0"/>
  <!-- Fuel drops -->
  <ellipse cx="187" cy="80" rx="5" ry="8" fill="#D69E2E"/>
  <ellipse cx="187" cy="95" rx="4" ry="6" fill="#D69E2E" opacity="0.7"/>
  <!-- Gauge/dial -->
  <circle cx="220" cy="130" r="35" fill="#2D3748" stroke="#4A5568" stroke-width="3"/>
  <circle cx="220" cy="130" r="28" fill="#1A202C"/>
  <line x1="220" y1="130" x2="245" y2="110" stroke="#FC8181" stroke-width="3" stroke-linecap="round"/>
  <circle cx="220" cy="130" r="4" fill="#E53E3E"/>
  <!-- Money symbol -->
  <text x="80" y="130" font-size="40" fill="#48BB78">💰</text>
  <!-- Arrows -->
  <text x="80" y="160" font-size="20" fill="#48BB78">↓</text>
  <!-- Text -->
  <text x="150" y="190" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">AHORRO DE COMBUSTIBLE</text>
</svg>
