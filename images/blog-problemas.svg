<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="warngrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DD6B20"/>
      <stop offset="100%" style="stop-color:#C05621"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="200" fill="#1a202c"/>
  <!-- Car engine bay hint -->
  <rect x="50" y="40" width="200" height="120" rx="10" fill="#2d3748"/>
  <!-- Engine block -->
  <rect x="80" y="60" width="80" height="60" rx="5" fill="#4A5568"/>
  <rect x="90" y="70" width="25" height="20" rx="3" fill="#2d3748"/>
  <rect x="125" y="70" width="25" height="20" rx="3" fill="#2d3748"/>
  <!-- AC Compressor -->
  <circle cx="200" cy="90" r="25" fill="#718096" stroke="#A0AEC0" stroke-width="2"/>
  <circle cx="200" cy="90" r="18" fill="none" stroke="#A0AEC0" stroke-width="1" opacity="0.5"/>
  <!-- Warning signs -->
  <circle cx="100" cy="140" r="18" fill="url(#warngrad)"/>
  <text x="100" y="146" text-anchor="middle" fill="white" font-size="20" font-weight="bold">!</text>
  <circle cx="150" cy="140" r="18" fill="url(#warngrad)"/>
  <text x="150" y="146" text-anchor="middle" fill="white" font-size="20" font-weight="bold">!</text>
  <circle cx="200" cy="140" r="18" fill="url(#warngrad)"/>
  <text x="200" y="146" text-anchor="middle" fill="white" font-size="20" font-weight="bold">!</text>
  <!-- Text -->
  <text x="150" y="190" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">PROBLEMAS COMUNES</text>
</svg>
