<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="emerggrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E53E3E"/>
      <stop offset="100%" style="stop-color:#9B2C2C"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="200" fill="#1a202c"/>
  <!-- Warning triangle -->
  <polygon points="150,20 260,180 40,180" fill="url(#emerggrad)"/>
  <polygon points="150,45 235,165 65,165" fill="#1a202c"/>
  <!-- Exclamation in triangle -->
  <text x="150" y="130" text-anchor="middle" fill="#E53E3E" font-size="60" font-weight="bold">!</text>
  <!-- Flanking warnings -->
  <circle cx="50" cy="50" r="20" fill="#ECC94B"/>
  <text x="50" y="57" text-anchor="middle" fill="#1a202c" font-size="20" font-weight="bold">!</text>
  <circle cx="250" cy="50" r="20" fill="#ECC94B"/>
  <text x="250" y="57" text-anchor="middle" fill="#1a202c" font-size="20" font-weight="bold">!</text>
  <!-- Smoke/heat effect -->
  <path d="M100 30 Q110 20 100 10" stroke="#ECC94B" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M120 25 Q130 15 120 5" stroke="#ECC94B" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M180 25 Q190 15 180 5" stroke="#ECC94B" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M200 30 Q210 20 200 10" stroke="#ECC94B" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Text -->
  <text x="150" y="195" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">SEÑALES DE EMERGENCIA</text>
</svg>
