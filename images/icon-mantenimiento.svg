<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="wrench" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#718096"/>
      <stop offset="50%" style="stop-color:#A0AEC0"/>
      <stop offset="100%" style="stop-color:#4A5568"/>
    </linearGradient>
  </defs>
  <!-- Wrench 1 -->
  <g transform="rotate(-45 60 60)">
    <rect x="25" y="20" width="70" height="14" rx="2" fill="url(#wrench)" transform="rotate(-20 60 27)"/>
    <circle cx="22" cy="27" r="12" fill="none" stroke="url(#wrench)" stroke-width="8"/>
    <circle cx="22" cy="27" r="8" fill="#1a202c"/>
  </g>
  <!-- Wrench 2 -->
  <g transform="rotate(30 60 60)">
    <rect x="25" y="55" width="55" height="10" rx="2" fill="url(#wrench)"/>
    <circle cx="80" cy="60" r="10" fill="none" stroke="url(#wrench)" stroke-width="6"/>
    <circle cx="80" cy="60" r="7" fill="#1a202c"/>
  </g>
  <!-- Sparkle symbols -->
  <circle cx="95" cy="25" r="3" fill="#48BB78"/>
  <circle cx="105" cy="35" r="2" fill="#48BB78"/>
  <circle cx="90" cy="40" r="2" fill="#48BB78"/>
</svg>
